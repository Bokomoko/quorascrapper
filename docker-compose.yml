services:
  preflight:
    build:
      context: .
      dockerfile: Dockerfile
    image: quorascrapper-qsbk:latest
    env_file:
      - .env.container
    network_mode: host
    command: ["uv", "run", "quora-preflight", "--mode", "subscriber"]
    restart: "no"

  kafka-subscriber:
    build:
      context: .
      dockerfile: Dockerfile
    image: quorascrapper-qsbk:latest
    container_name: qsbk-subscriber
    env_file:
      - .env.container
    command: ["uv", "run", "qsbk", "subscriber"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      preflight:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "uv", "run", "quora-healthcheck", "subscriber"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  qsbk-serve:
    build:
      context: .
      dockerfile: Dockerfile
    image: quorascrapper-qsbk:latest
    container_name: qsbk-serve
    env_file:
      - .env.container
    command: ["uv", "run", "qsbk", "serve", "--host", "0.0.0.0", "--port", "8765"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      preflight:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "uv", "run", "quora-healthcheck", "serve"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  quora-scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file:
      - .env.scraper
    network_mode: host
    profiles:
      - scraper
    depends_on:
      preflight:
        condition: service_completed_successfully
    command: ["uv", "run", "qsbk", "--sender", "kafka"]
    restart: "no"
